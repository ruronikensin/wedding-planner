<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 Our Wedding Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c0627a;
    --rose-light: #f7e8ed;
    --rose-mid: #e8b4c0;
    --plum: #3a1f5c;
    --plum-mid: #7a4fa8;
    --plum-light: #f0e8fa;
    --gold: #c9a84c;
    --gold-light: #fdf6e3;
    --cream: #fdfaf6;
    --white: #ffffff;
    --gray: #8a7a8a;
    --border: #e8dff0;
    --shadow: 0 4px 20px rgba(60, 30, 90, 0.05);
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Lato', sans-serif; 
    background: var(--cream); 
    color: var(--plum); 
    min-height: 100vh;
    background-image: 
      radial-gradient(at 0% 0%, #f7e8ed 0px, transparent 50%),
      radial-gradient(at 100% 100%, #f0e8fa 0px, transparent 50%);
    background-attachment: fixed;
  }

  /* NAV */
  #nav {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 12px rgba(60,30,90,0.06);
  }
  .nav-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
  }
  .nav-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--plum); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .nav-tabs {
    display: flex; overflow-x: auto; padding: 0 24px;
    gap: 8px; border-top: 1px solid var(--border);
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 12px 18px; font-size: 13.5px; cursor: pointer;
    border: none; background: none; color: var(--gray);
    border-bottom: 3px solid transparent; white-space: nowrap;
    font-family: 'Lato', sans-serif; transition: var(--transition);
    font-weight: 500;
  }
  .nav-tab:hover { color: var(--plum-mid); }
  .nav-tab.active { color: var(--rose); border-bottom-color: var(--rose); font-weight: 700; }

  /* PAGES */
  .page { display: none; padding: 32px 24px; max-width: 1000px; margin: 0 auto; }
  .page.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* HOME */
  .home-hero {
    background: linear-gradient(135deg, #f7e8ed 0%, #f0e8fa 50%, #fdf6e3 100%);
    border-radius: 28px; padding: 56px 32px; text-align: center;
    margin-bottom: 36px; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .home-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c0627a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .home-hero h1 { font-family: 'Playfair Display', serif; font-size: 46px; color: var(--plum); margin-bottom: 12px; position: relative; font-weight: 700; }
  .home-hero p { font-size: 17px; color: var(--gray); position: relative; font-weight: 300; }
  .budget-pill {
    display: inline-block; background: var(--white); border-radius: 30px;
    padding: 10px 26px; margin-top: 24px; border: 1px solid var(--border);
    font-weight: 700; color: var(--plum-mid); font-size: 15px; position: relative;
    box-shadow: 0 4px 15px rgba(60,30,90,0.04);
  }
  .home-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;
  }
  .home-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 20px;
    padding: 24px 20px; cursor: pointer; transition: var(--transition); text-align: left;
    box-shadow: 0 2px 8px rgba(60,30,90,0.02);
  }
  .home-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(60,30,90,0.08); border-color: var(--rose-mid); }
  .home-card .icon { font-size: 36px; margin-bottom: 12px; }
  .home-card .title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--plum); font-weight: 700; }
  .home-card .count { font-size: 13px; color: var(--gray); margin-top: 6px; }

  /* PAGE HEADER */
  .page-header {
    border-radius: 22px; padding: 26px 30px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    box-shadow: var(--shadow);
  }
  .page-header h2 { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--plum); font-weight: 700; }
  .page-header .meta { font-size: 13.5px; color: var(--gray); margin-top: 4px; }
  .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }

  /* BUTTONS */
  .btn-primary {
    background: linear-gradient(135deg, var(--rose), #a84a62);
    color: var(--white); border: none; border-radius: 12px;
    padding: 11px 22px; cursor: pointer; font-size: 14.5px; font-weight: 700;
    font-family: 'Lato', sans-serif; transition: var(--transition);
    box-shadow: 0 4px 15px rgba(192, 98, 122, 0.25);
  }
  .btn-primary:hover { opacity: 0.95; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192, 98, 122, 0.35); }
  .btn-secondary {
    background: var(--plum-light); color: var(--plum-mid); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 20px; cursor: pointer; font-size: 14px;
    font-family: 'Lato', sans-serif; font-weight: 700; transition: var(--transition);
  }
  .btn-secondary:hover { background: var(--rose-light); color: var(--rose); transform: translateY(-1px); }
  .btn-cancel {
    background: #f5f0f8; color: var(--gray); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 18px; cursor: pointer; font-size: 14px;
    font-family: 'Lato', sans-serif; transition: var(--transition);
  }
  .btn-cancel:hover { background: #ebdff5; }
  .btn-icon {
    border: none; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 14px;
    transition: var(--transition);
  }
  .btn-icon:hover { transform: scale(1.05); }
  .btn-edit { background: var(--plum-light); color: var(--plum-mid); }
  .btn-edit:hover { background: var(--plum-mid); color: var(--white); }
  .btn-delete { background: #fde8e8; color: #c0392b; }
  .btn-delete:hover { background: #c0392b; color: var(--white); }

  /* FORM */
  .form-box {
    background: #faf7fd; border: 1.5px solid #d4b8f0; border-radius: 20px;
    padding: 24px; margin-bottom: 24px;
    box-shadow: 0 8px 30px rgba(60,30,90,0.04);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-full { grid-column: 1 / -1; }
  label { display: block; font-size: 13.5px; color: var(--plum-mid); font-weight: 700; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=url], textarea, select {
    width: 100%; padding: 11px 15px; border: 1px solid var(--border); border-radius: 12px;
    font-size: 14.5px; background: var(--white); color: var(--plum);
    font-family: 'Lato', sans-serif; outline: none; transition: var(--transition);
  }
  input:focus, textarea:focus, select:focus { border-color: var(--plum-mid); box-shadow: 0 0 0 3px rgba(122, 79, 168, 0.15); }
  textarea { resize: vertical; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .checkbox-row input { width: 18px; height: 18px; cursor: pointer; }
  .checkbox-row label { margin: 0; font-size: 14.5px; color: var(--plum); cursor: pointer; font-weight: 500; }

  /* ENTRY CARD */
  .entry-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; margin-bottom: 14px;
    display: flex; gap: 18px; align-items: flex-start;
    transition: var(--transition);
    box-shadow: 0 2px 6px rgba(60,30,90,0.01);
  }
  .entry-card:hover { box-shadow: 0 8px 24px rgba(60,30,90,0.06); transform: translateY(-2px); }
  .entry-thumb { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
  .entry-thumb-placeholder {
    width: 80px; height: 80px; border-radius: 14px; background: var(--plum-light);
    display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0;
  }
  .entry-body { flex: 1; min-width: 0; }
  .entry-name { font-family: 'Playfair Display', serif; font-size: 18.5px; color: var(--plum); font-weight: 700; }
  .entry-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .badge { font-size: 12.5px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .badge-cost { background: #e8f5e8; color: #2a6e3a; }
  .badge-selected { background: var(--rose-light); color: var(--rose); }
  .entry-notes { font-size: 14px; color: var(--gray); margin-top: 6px; line-height: 1.4; }
  .entry-link { font-size: 13.5px; color: var(--plum-mid); margin-top: 6px; display: inline-block; word-break: break-all; text-decoration: none; }
  .entry-link:hover { text-decoration: underline; }
  .entry-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* COMPARE */
  .compare-box {
    background: #faf7fd; border: 1px solid var(--border); border-radius: 20px;
    padding: 24px; margin-bottom: 24px;
    box-shadow: 0 4px 15px rgba(60,30,90,0.02);
  }
  .compare-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .compare-header h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--plum); font-weight: 700; }
  table { width: 100%; border-collapse: collapse; font-size: 14.5px; }
  th { padding: 12px 14px; text-align: left; background: var(--plum-light); color: var(--plum); font-weight: 700; font-size: 13.5px; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr.selected-row { background: #f0faf0; }
  tr:last-child td { border-bottom: none; }
  .compare-summary {
    margin-top: 18px; padding: 14px 18px; background: var(--plum-light);
    border-radius: 14px; font-size: 14.5px; color: var(--plum);
  }

  /* BUDGET */
  .budget-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 18px; margin-bottom: 24px; }
  .stat-card { background: var(--white); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .stat-label { font-size: 13px; color: var(--gray); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .progress-wrap { margin-bottom: 24px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 8px; }
  .progress-bar { height: 12px; background: var(--plum-light); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease-in-out; background: var(--rose); }
  .budget-item {
    background: var(--white); border: 1px solid var(--border); border-radius: 18px;
    padding: 16px 20px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    transition: var(--transition);
  }
  .budget-item:hover { box-shadow: 0 4px 12px rgba(60,30,90,0.03); }
  .budget-item.over { border-color: #f5c6c6; background: #fffdfd; }
  .budget-cat { font-weight: 700; color: var(--plum); flex: 1; min-width: 120px; font-family: 'Playfair Display', serif; font-size: 17px; }
  .budget-note { font-size: 13.5px; color: var(--gray); margin-top: 2px; }
  .budget-num { font-size: 14.5px; }

  /* MOODBOARD */
  .mood-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
  .mood-item { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); position: relative; background: var(--white); transition: var(--transition); box-shadow: var(--shadow); }
  .mood-item:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(60,30,90,0.08); }
  .mood-item img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .mood-label { padding: 12px; }
  .mood-label input { border: none; background: none; width: 100%; font-size: 13.5px; color: var(--plum); font-weight: 700; font-family: 'Lato', sans-serif; outline: none; }
  .mood-label input:focus { border-bottom: 1px solid var(--plum-mid); }
  .mood-del { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.92); border: none; border-radius: 10px; padding: 6px 10px; cursor: pointer; font-size: 13.5px; transition: var(--transition); }
  .mood-del:hover { background: #fde8e8; color: #c0392b; }

  /* UPLOAD BTN */
  .upload-btn {
    background: var(--plum-light); color: var(--plum-mid); border: 1px dashed var(--plum-mid);
    border-radius: 12px; padding: 10px 20px; cursor: pointer; font-size: 13.5px; font-weight: 700;
    font-family: 'Lato', sans-serif; transition: var(--transition);
  }
  .upload-btn:hover { background: var(--plum-light); color: var(--plum-mid); border-color: var(--rose); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 64px 24px; color: #c0a8d0; }
  .empty .empty-icon { font-size: 64px; margin-bottom: 14px; }
  .empty p { font-size: 16px; font-weight: 500; }

  /* EXPORT */
  .export-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    padding: 16px 20px; background: var(--gold-light); border: 1px solid #e8d8a0;
    border-radius: 18px; align-items: center;
    box-shadow: 0 2px 10px rgba(201,168,76,0.05);
  }
  .export-bar span { font-size: 13.5px; color: #7a6030; flex: 1; font-weight: 500; }

  /* Sync Indicator Overlay styling */
  #sync-overlay {
    position: fixed; bottom: 20px; left: 20px;
    background: var(--plum); color: var(--white);
    padding: 8px 16px; border-radius: 20px;
    font-size: 12.5px; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    z-index: 1000; transition: opacity 0.3s;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2a6e3a; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .budget-stats { grid-template-columns: 1fr 1fr; }
    .home-hero h1 { font-size: 32px; }
    .page { padding: 18px 16px; }
    .nav-top { padding: 12px 16px; }
    .nav-tabs { padding: 0 16px; }
  }
</style>
</head>
<body>

<div id="nav">
  <div class="nav-top">
    <div class="nav-brand" onclick="showPage('home')">💍 Wedding Planner</div>
    <div style="font-size:13px;color:var(--gray)">Family Private</div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
</div>

<div id="pages">
  <!-- Pages injected by JS -->
</div>

<!-- Real-time Sync Toast Badge -->
<div id="sync-overlay" style="opacity: 0;">
  <span class="sync-dot"></span>
  <span id="sync-text">Cloud Synced</span>
</div>

<!-- Load Google Firebase Client Compatibility SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
// Initialize Firebase using the configuration supplied by the USER
const firebaseConfig = {
  apiKey: "AIzaSyDRV3_NEBjExb8oOHMPEjVIOASKzQk4wL0",
  authDomain: "wedding-planner-final.firebaseapp.com",
  projectId: "wedding-planner-final",
  storageBucket: "wedding-planner-final.firebasestorage.app",
  messagingSenderId: "301495022006",
  appId: "1:301495022006:web:28b6952914149b55d29117",
  measurementId: "G-3TR5WE7VVK"
};

// Start Firebase App and Firestore
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const PAGES = [
  { id:'home',         label:'Home',          icon:'🏠' },
  { id:'venue',        label:'Venue',          icon:'🏛️' },
  { id:'event',        label:'Event Planner',  icon:'📋' },
  { id:'photography',  label:'Photography',    icon:'📷' },
  { id:'makeup',       label:'Makeup Artist',  icon:'💄' },
  { id:'budget',       label:'Budget',         icon:'💰' },
  { id:'otherplans',   label:'Other Plans',    icon:'📝' },
  { id:'moodboard',    label:'Moodboard',      icon:'🎨' },
  { id:'bridecloth',   label:'Bride Outfits',  icon:'👗' },
  { id:'mencloth',     label:'Groom Outfits',  icon:'🤵' },
];

const CATEGORY_PAGES = PAGES.filter(p => !['home','budget','moodboard'].includes(p.id));
const PAGE_COLORS = {
  venue:'#f0e8fa', event:'#fde8d8', photography:'#d8edf5',
  makeup:'#fde8f0', otherplans:'#f5f0d8', bridecloth:'#f5d8d8',
  mencloth:'#d8d8f5'
};

function uid() { return Math.random().toString(36).slice(2,9); }

// Global app state containing all synced data
let appState = {};

// Fallback to fetch data from standard LocalStorage
function getDataFromLocalStorage(key) {
  try { return JSON.parse(localStorage.getItem('wp_'+key)||'[]'); } catch { return []; }
}

// Redefine getter to fetch from the reactive global appState
function getData(key) {
  return appState[key] || [];
}

// Redefine setter to push updates directly to Google Firestore cloud in real-time
function setData(key, val) {
  appState[key] = val;
  // Double-backup locally
  try { localStorage.setItem('wp_'+key, JSON.stringify(val)); } catch {}
  
  // Show Syncing indicator
  showSyncIndicator("Saving to Cloud...");

  // Write to Firebase Firestore
  db.collection("wedding_planner").doc(key).set({ items: val })
    .then(() => {
      showSyncIndicator("Cloud Synced", 1500);
    })
    .catch(err => {
      console.error("Cloud save failed for " + key, err);
      showSyncIndicator("Offline Mode", 3000, "#c0392b");
    });
}

// Visual indicator overlay controller
function showSyncIndicator(text, duration = 0, color = "#2a6e3a") {
  const overlay = document.getElementById("sync-overlay");
  const dot = overlay.querySelector(".sync-dot");
  const textEl = document.getElementById("sync-text");
  if (!overlay) return;

  textEl.innerText = text;
  dot.style.background = color;
  overlay.style.opacity = "1";

  if (duration > 0) {
    setTimeout(() => {
      overlay.style.opacity = "0";
    }, duration);
  }
}

// REALTIME LISTENER: Sync all planner components and automatically refresh current active tab
db.collection("wedding_planner").onSnapshot((querySnapshot) => {
  querySnapshot.forEach((doc) => {
    appState[doc.id] = doc.data().items || [];
  });
  
  // Initialize missing modules in Firestore from LocalStorage/Defaults
  let hasMissing = false;
  PAGES.forEach(p => {
    let key = p.id;
    if (key === 'budget') key = 'budget_items';
    if (!appState[key]) {
      appState[key] = getDataFromLocalStorage(key);
      hasMissing = true;
      db.collection("wedding_planner").doc(key).set({ items: appState[key] });
    }
  });

  if (!hasMissing) {
    showSyncIndicator("Synced Live", 1200);
  }

  // Auto-refresh whichever page container is currently active
  const activeTab = document.querySelector('.nav-tab.active');
  const activeId = activeTab ? activeTab.id.replace('tab_','') : 'home';
  renderPage(activeId);
}, (error) => {
  console.error("Firestore Listener Failed, falling back to LocalStorage:", error);
  showSyncIndicator("Offline", 4000, "#c0392b");
  
  // Local fallback
  PAGES.forEach(p => {
    let key = p.id;
    if (key === 'budget') key = 'budget_items';
    appState[key] = getDataFromLocalStorage(key);
  });
  
  const activeTab = document.querySelector('.nav-tab.active');
  const activeId = activeTab ? activeTab.id.replace('tab_','') : 'home';
  renderPage(activeId);
});

// Build nav tabs
const tabsEl = document.getElementById('navTabs');
PAGES.forEach(p => {
  const t = document.createElement('button');
  t.className = 'nav-tab' + (p.id==='home'?' active':'');
  t.id = 'tab_'+p.id;
  t.innerHTML = p.icon + ' ' + p.label;
  t.onclick = () => showPage(p.id);
  tabsEl.appendChild(t);
});

// Build page containers
const pagesEl = document.getElementById('pages');
PAGES.forEach(p => {
  const div = document.createElement('div');
  div.className = 'page' + (p.id==='home'?' active':'');
  div.id = 'page_'+p.id;
  pagesEl.appendChild(div);
});

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page_'+id).classList.add('active');
  document.getElementById('tab_'+id).classList.add('active');
  renderPage(id);
  window.scrollTo(0,0);
}

// ─── CATEGORY PAGE ───────────────────────────────────────────────
function renderCategoryPage(pid) {
  const page = PAGES.find(p=>p.id===pid);
  const el = document.getElementById('page_'+pid);
  const entries = getData(pid);
  const color = PAGE_COLORS[pid]||'#f0e8fa';
  const totalSelected = entries.filter(e=>e.selected&&e.cost).reduce((s,e)=>s+Number(e.cost),0);

  el.innerHTML = `
    <div class="export-bar">
      <span>💡 Your data is fully synced to Firebase in real-time. Use Export to back up or share offline.</span>
      <button class="btn-secondary" onclick="exportData()">📤 Export All</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📥 Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="page-header" style="background:linear-gradient(135deg,${color} 0%,#fff 100%);border:1px solid rgba(180,130,220,0.15)">
      <div>
        <h2>${page.icon} ${page.label}</h2>
        <div class="meta">${entries.length} entries · ${entries.filter(e=>e.selected).length} selected${totalSelected>0?' · ৳'+totalSelected.toLocaleString()+' committed':''}</div>
      </div>
      <div class="btn-group">
        ${entries.length>=2?`<button class="btn-secondary" onclick="toggleCompare('${pid}')">⚖️ Compare</button>`:''}
        <button class="btn-primary" onclick="showAddForm('${pid}')">+ Add Entry</button>
      </div>
    </div>
    <div id="compare_${pid}" style="display:none"></div>
    <div id="form_${pid}"></div>
    <div id="list_${pid}">
      ${entries.length===0
        ? `<div class="empty"><div class="empty-icon">${page.icon}</div><p>No entries yet. Click "+ Add Entry" to get started!</p></div>`
        : entries.map(e=>entryCardHTML(pid,e)).join('')
      }
    </div>
  `;
}

function entryCardHTML(pid, e) {
  return `
    <div class="entry-card" id="ecard_${e.id}">
      ${e.photo
        ? `<img class="entry-thumb" src="${e.photo}" alt="${e.name}">`
        : `<div class="entry-thumb-placeholder">${PAGES.find(p=>p.id===pid)?.icon||'📌'}</div>`
      }
      <div class="entry-body">
        <div class="entry-name">${e.name}</div>
        <div class="entry-badges">
          ${e.cost?`<span class="badge badge-cost">৳${Number(e.cost).toLocaleString()}</span>`:''}
          ${e.selected?`<span class="badge badge-selected">✓ Selected</span>`:''}
        </div>
        ${e.notes?`<div class="entry-notes">${e.notes}</div>`:''}
        ${e.link?`<a class="entry-link" href="${e.link}" target="_blank">🔗 ${e.link}</a>`:''}
      </div>
      <div class="entry-actions">
        <button class="btn-icon btn-edit" onclick="showEditForm('${pid}','${e.id}')">✏️</button>
        <button class="btn-icon btn-delete" onclick="deleteEntry('${pid}','${e.id}')">🗑️</button>
      </div>
    </div>`;
}

let compareVisible = {};
function toggleCompare(pid) {
  compareVisible[pid] = !compareVisible[pid];
  const el = document.getElementById('compare_'+pid);
  if (compareVisible[pid]) {
    el.style.display = 'block';
    el.innerHTML = buildCompareHTML(pid);
  } else {
    el.style.display = 'none';
  }
}

function buildCompareHTML(pid) {
  const entries = getData(pid).filter(e=>e.cost);
  if (entries.length < 2) return `<div class="compare-box"><p style="color:var(--gray);padding:12px">Add at least 2 entries with costs to compare.</p></div>`;
  const sorted = [...entries].sort((a,b)=>Number(a.cost)-Number(b.cost));
  const cheapId = sorted[0].id;
  const rows = sorted.map(e=>`
    <tr class="${e.selected?'selected-row':''}">
      <td><div style="display:flex;align-items:center;gap:8px">
        ${e.photo?`<img src="${e.photo}" style="width:32px;height:32px;border-radius:6px;object-fit:cover">`:''}
        <span style="font-weight:${e.selected?700:400}">${e.name}</span>
      </div></td>
      <td><span style="font-weight:700;color:${e.id===cheapId?'#2a6e3a':'var(--plum)'}">
        ৳${Number(e.cost).toLocaleString()}
        ${e.id===cheapId?'<span style="margin-left:4px;font-size:11px;background:#d8f5e8;color:#2a6e3a;padding:1px 6px;border-radius:10px">Lowest</span>':''}
      </span></td>
      <td style="color:var(--gray);max-width:160px">${e.notes||'—'}</td>
      <td>${e.link?`<a href="${e.link}" target="_blank" style="color:var(--plum-mid)">Visit</a>`:'—'}</td>
      <td>${e.selected?'<span class="badge badge-selected">Selected</span>':'—'}</td>
    </tr>`).join('');
  const committed = entries.filter(e=>e.selected).reduce((s,e)=>s+Number(e.cost),0);
  return `
    <div class="compare-box">
      <div class="compare-header">
        <h3>⚖️ Comparison</h3>
        <button class="btn-cancel" onclick="toggleCompare('${pid}')">Close</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Name</th><th>Cost (৳)</th><th>Notes</th><th>Link</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="compare-summary">
        <strong>Total committed:</strong> ৳${committed.toLocaleString()}
        <span style="margin-left:12px;color:var(--gray)">(${entries.filter(e=>e.selected).length} selected)</span>
      </div>
    </div>`;
}

function showAddForm(pid) {
  const el = document.getElementById('form_'+pid);
  el.innerHTML = formHTML(pid, null);
}
function showEditForm(pid, eid) {
  const entry = getData(pid).find(e=>e.id===eid);
  if (!entry) return;
  const el = document.getElementById('form_'+pid);
  el.innerHTML = formHTML(pid, entry);
}
function hideForm(pid) { document.getElementById('form_'+pid).innerHTML=''; }

function formHTML(pid, entry) {
  const e = entry || {};
  return `
    <div class="form-box">
      <div class="form-grid">
        <div>
          <label>Name / Title *</label>
          <input type="text" id="f_name" value="${e.name||''}" placeholder="e.g. Royal Garden Hall">
        </div>
        <div>
          <label>Cost (৳)</label>
          <input type="number" id="f_cost" value="${e.cost||''}" placeholder="e.g. 150000">
        </div>
        <div class="form-full">
          <label>Notes / Description</label>
          <textarea id="f_notes" rows="2" placeholder="Add details...">${e.notes||''}</textarea>
        </div>
        <div>
          <label>Website / Link</label>
          <input type="url" id="f_link" value="${e.link||''}" placeholder="https://...">
        </div>
        <div>
          <label>Photo</label>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="upload-btn" onclick="document.getElementById('f_photo_input').click()">
              📷 ${e.photo?'Change Photo':'Upload Photo'}
            </button>
            <input type="file" id="f_photo_input" accept="image/*" style="display:none" onchange="previewPhoto(event)">
            <img id="f_photo_preview" src="${e.photo||''}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;display:${e.photo?'block':'none'}">
          </div>
          <input type="hidden" id="f_photo" value="${e.photo||''}">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="f_selected" ${e.selected?'checked':''}>
        <label for="f_selected">Mark as Selected / Chosen</label>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="saveEntry('${pid}','${e.id||''}')">💾 Save Entry</button>
        <button class="btn-cancel" onclick="hideForm('${pid}')">Cancel</button>
      </div>
    </div>`;
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  // Basic file compression before saving to keep Firestore document size light
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.src = ev.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const maxW = 320; 
      const scale = maxW / img.width;
      canvas.width = maxW;
      canvas.height = img.height * scale;
      
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL("image/jpeg", 0.7); // compress quality to 70%
      
      document.getElementById('f_photo').value = base64;
      const preview = document.getElementById('f_photo_preview');
      preview.src = base64;
      preview.style.display = 'block';
    };
  };
  reader.readAsDataURL(file);
}

function saveEntry(pid, eid) {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  const entry = {
    id: eid || uid(),
    name,
    cost: document.getElementById('f_cost').value,
    notes: document.getElementById('f_notes').value,
    link: document.getElementById('f_link').value,
    photo: document.getElementById('f_photo').value,
    selected: document.getElementById('f_selected').checked,
  };
  const entries = getData(pid);
  if (eid) {
    const idx = entries.findIndex(e=>e.id===eid);
    if (idx>=0) entries[idx]=entry; else entries.push(entry);
  } else {
    entries.push(entry);
  }
  setData(pid, entries);
}

function deleteEntry(pid, eid) {
  if (!confirm('Delete this entry?')) return;
  setData(pid, getData(pid).filter(e=>e.id!==eid));
}

// ─── BUDGET PAGE ─────────────────────────────────────────────────
function renderBudgetPage() {
  const el = document.getElementById('page_budget');
  const items = getData('budget_items');
  const totalBudget = items.reduce((s,i)=>s+(Number(i.budgeted)||0),0);
  const totalSpent  = items.reduce((s,i)=>s+(Number(i.spent)||0),0);
  const remaining   = totalBudget - totalSpent;
  const pct = totalBudget>0 ? Math.min(100,Math.round((totalSpent/totalBudget)*100)) : 0;

  el.innerHTML = `
    <div class="export-bar">
      <span>💡 Your data is fully synced to Firebase in real-time.</span>
      <button class="btn-secondary" onclick="exportData()">📤 Export All</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile2').click()">📥 Import</button>
      <input type="file" id="importFile2" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="page-header" style="background:linear-gradient(135deg,#d8f5e8 0%,#fff 100%);border:1px solid rgba(100,180,140,0.2)">
      <div><h2>💰 Budget Tracker</h2><div class="meta">Track your wedding spending</div></div>
      <button class="btn-primary" onclick="showBudgetForm()">+ Add Item</button>
    </div>
    <div class="budget-stats">
      <div class="stat-card"><div class="stat-label">Total Budget</div><div class="stat-value" style="color:#3a6e8a">৳${totalBudget.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value" style="color:#c0392b">৳${totalSpent.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-value" style="color:${remaining>=0?'#2a6e3a':'#c0392b'}">৳${remaining.toLocaleString()}</div></div>
    </div>
    ${totalBudget>0?`
    <div class="progress-wrap">
      <div class="progress-labels"><span>Budget used</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${totalSpent>totalBudget?'#e74c3c':'var(--rose)'}"></div></div>
    </div>`:''}
    <div id="budget_form"></div>
    <div id="budget_list">
      ${items.length===0
        ?'<div class="empty"><div class="empty-icon">💰</div><p>No budget items yet.</p></div>'
        :items.map(item=>{
          const over = Number(item.spent)>Number(item.budgeted)&&item.budgeted;
          return `<div class="budget-item${over?' over':''}">
            <div style="flex:1;min-width:120px">
              <div class="budget-cat">${item.category}</div>
              ${item.note?`<div class="budget-note">${item.note}</div>`:''}
            </div>
            <div class="budget-num">Budget: <b>৳${Number(item.budgeted||0).toLocaleString()}</b></div>
            <div class="budget-num" style="color:${over?'#c0392b':'#2a6e3a'}">Spent: <b>৳${Number(item.spent||0).toLocaleString()}</b></div>
            ${over?'<span class="badge" style="background:#fde8e8;color:#c0392b">Over budget</span>':''}
            <button class="btn-icon btn-delete" onclick="deleteBudgetItem('${item.id}')">🗑️</button>
          </div>`;
        }).join('')
      }
    </div>`;
}

function showBudgetForm() {
  document.getElementById('budget_form').innerHTML = `
    <div class="form-box">
      <div class="form-grid">
        <div><label>Category</label><input type="text" id="bf_cat" placeholder="e.g. Venue"></div>
        <div><label>Budgeted (৳)</label><input type="number" id="bf_budget" placeholder="0"></div>
        <div><label>Spent (৳)</label><input type="number" id="bf_spent" placeholder="0"></div>
        <div><label>Note (optional)</label><input type="text" id="bf_note" placeholder="Any note..."></div>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="saveBudgetItem()">💾 Save</button>
        <button class="btn-cancel" onclick="document.getElementById('budget_form').innerHTML=''">Cancel</button>
      </div>
    </div>`;
}
function saveBudgetItem() {
  const cat = document.getElementById('bf_cat').value.trim();
  if (!cat) { alert('Enter a category.'); return; }
  const items = getData('budget_items');
  items.push({ id:uid(), category:cat,
    budgeted:document.getElementById('bf_budget').value,
    spent:document.getElementById('bf_spent').value,
    note:document.getElementById('bf_note').value });
  setData('budget_items', items);
}
function deleteBudgetItem(id) {
  if (!confirm('Delete?')) return;
  setData('budget_items', getData('budget_items').filter(i=>i.id!==id));
}

// ─── MOODBOARD PAGE ──────────────────────────────────────────────
function renderMoodboardPage() {
  const el = document.getElementById('page_moodboard');
  const items = getData('moodboard');
  el.innerHTML = `
    <div class="export-bar">
      <span>💡 Your data is fully synced to Firebase in real-time.</span>
      <button class="btn-secondary" onclick="exportData()">📤 Export All</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile3').click()">📥 Import</button>
      <input type="file" id="importFile3" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="page-header" style="background:linear-gradient(135deg,#f5d8e8 0%,#fff 100%);border:1px solid rgba(180,100,140,0.2)">
      <div><h2>🎨 Moodboard</h2><div class="meta">${items.length} images</div></div>
      <button class="btn-primary" onclick="document.getElementById('mood_upload').click()">📷 Add Images</button>
    </div>
    <input type="file" id="mood_upload" accept="image/*" multiple style="display:none" onchange="addMoodImages(event)">
    ${items.length===0
      ?'<div class="empty"><div class="empty-icon">🎨</div><p>Upload your wedding inspiration photos!</p></div>'
      :`<div class="mood-grid">${items.map(item=>`
        <div class="mood-item">
          <img src="${item.photo}" alt="${item.label}">
          <div class="mood-label"><input type="text" value="${item.label}" onchange="updateMoodLabel('${item.id}',this.value)"></div>
          <button class="mood-del" onclick="deleteMoodItem('${item.id}')">🗑️</button>
        </div>`).join('')}</div>`
    }`;
}
function addMoodImages(event) {
  const files = Array.from(event.target.files);
  const items = getData('moodboard');
  let loaded = 0;
  
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      // Compress moodboard photo before upload
      const img = new Image();
      img.src = ev.target.result;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const maxW = 400; 
        const scale = maxW / img.width;
        canvas.width = maxW;
        canvas.height = img.height * scale;
        
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.65); // compress quality
        
        items.push({ id:uid(), photo:base64, label:file.name.replace(/\.[^/.]+$/,'') });
        loaded++;
        if (loaded === files.length) {
          setData('moodboard', items);
        }
      };
    };
    reader.readAsDataURL(file);
  });
}
function updateMoodLabel(id, val) {
  const items = getData('moodboard').map(i=>i.id===id?{...i,label:val}:i);
  setData('moodboard',items);
}
function deleteMoodItem(id) {
  setData('moodboard', getData('moodboard').filter(i=>i.id!==id));
}

// ─── HOME PAGE ───────────────────────────────────────────────────
function renderHomePage() {
  const el = document.getElementById('page_home');
  const totalCommitted = CATEGORY_PAGES.reduce((sum,p)=>{
    return sum + getData(p.id).filter(e=>e.selected&&e.cost).reduce((s,e)=>s+Number(e.cost),0);
  },0);
  const cards = PAGES.filter(p=>p.id!=='home').map(p=>{
    let count = 0;
    if (p.id==='budget') count = getData('budget_items').length;
    else if (p.id==='moodboard') count = getData('moodboard').length;
    else count = getData(p.id).length;
    return `
      <div class="home-card" onclick="showPage('${p.id}')">
        <div class="icon">${p.icon}</div>
        <div class="title">${p.label}</div>
        ${count>0?`<div class="count">${count} entries</div>`:'<div class="count">Empty</div>'}
      </div>`;
  }).join('');
  el.innerHTML = `
    <div class="home-hero">
      <div style="font-size:52px;margin-bottom:12px">💍</div>
      <h1>Our Wedding Planner</h1>
      <p>A private space to plan every beautiful detail together</p>
      ${totalCommitted>0?`<div class="budget-pill">💰 Committed so far: ৳${totalCommitted.toLocaleString()}</div>`:''}
    </div>
    <h3 style="font-family:'Playfair Display',serif;font-size:20px;color:var(--plum);margin-bottom:16px">Planning Sections</h3>
    <div class="home-grid">${cards}</div>
    `;
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────
function exportData() {
  const all = {};
  CATEGORY_PAGES.forEach(p => all[p.id] = getData(p.id));
  all.budget_items = getData('budget_items');
  all.moodboard = getData('moodboard');
  const blob = new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wedding-planner-backup.json';
  a.click();
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (confirm('This will replace ALL current data. Continue?')) {
        Object.keys(data).forEach(key => setData(key, data[key]));
        alert('Data imported successfully!');
        renderPage(document.querySelector('.nav-tab.active').id.replace('tab_',''));
      }
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file);
}

// ─── ROUTER ──────────────────────────────────────────────────────
function renderPage(id) {
  if (id==='home') renderHomePage();
  else if (id==='budget') renderBudgetPage();
  else if (id==='moodboard') renderMoodboardPage();
  else renderCategoryPage(id);
}

// Init
renderHomePage();
</script>

</html>
